<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>近代通商口岸 · 嵌入地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #1a1a1a;
            overflow: hidden;
            height: 100vh;
        }
        #map {
            width: 100vw;
            height: 100vh;
            background: #2c3e50;
        }

        /* 左上角标题（轻量） */
        .header {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 8px;
            color: #fff;
            border-left: 3px solid #b22234;
            pointer-events: none;
            user-select: none;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .header h1 small {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.7;
            margin-left: 8px;
        }

        /* 右下角图例 */
        .legend {
            position: absolute;
            bottom: 100px;
            right: 16px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 10px 14px;
            border-radius: 8px;
            color: #eee;
            font-size: 12px;
            min-width: 100px;
            pointer-events: none;
        }
        .legend .title {
            font-weight: 600;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
            margin-bottom: 4px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 3px 0;
        }
        .legend-item .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .legend-item .year-range {
            opacity: 0.6;
            font-size: 10px;
            margin-left: auto;
        }

        /* 底部控制栏（适合触屏和鼠标） */
        .control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 14px;
            width: 92%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .control-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .control-top .year-display {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            min-width: 70px;
        }
        .control-top .year-display span {
            color: #f0c27f;
        }
        .control-top .treaty-badge {
            color: #ccc;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 12px;
            border-radius: 12px;
            white-space: nowrap;
        }
        .btn-group button {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .btn-group button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .btn-group button.play-btn {
            background: #b22234;
            min-width: 60px;
        }
        .btn-group button.play-btn:hover {
            background: #8a1a2a;
        }
        .btn-group button.play-btn.paused {
            background: #3d6b4f;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-wrapper .year-label {
            color: #aaa;
            font-size: 12px;
            font-weight: 600;
            min-width: 32px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 3px;
            background: #555;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #f0c27f;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #f0c27f;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .quick-years {
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
        }
        .quick-years .qy {
            background: transparent;
            border: none;
            color: #888;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 10px;
            font-family: inherit;
            transition: 0.2s;
        }
        .quick-years .qy:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        .quick-years .qy.active-qy {
            color: #f0c27f;
            font-weight: 700;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 13px;
            }
            .header h1 small {
                font-size: 10px;
                display: block;
                margin-left: 0;
            }
            .control-panel {
                padding: 10px 14px;
                bottom: 12px;
            }
            .control-top .year-display {
                font-size: 15px;
            }
            .legend {
                bottom: 90px;
                right: 10px;
                padding: 6px 10px;
                font-size: 10px;
            }
        }

        /* 标记动画 */
        .pulse-marker {
            animation: pulse 1.2s ease-in-out 3;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.35);
                opacity: 0.7;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            font-family: 'PingFang SC', sans-serif;
        }
        .leaflet-popup-content .popup-title {
            font-size: 16px;
            font-weight: 700;
            border-bottom: 1px solid #ddd;
            padding-bottom: 2px;
            margin-bottom: 4px;
        }
        .leaflet-popup-content .popup-detail {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0 10px;
            font-size: 13px;
        }
        .leaflet-popup-content .popup-detail .label {
            color: #666;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="header">
        <h1>📜 通商口岸 <small>1842–1895</small></h1>
    </div>

    <div class="legend" id="legend"></div>

    <div class="control-panel">
        <div class="control-top">
            <div class="year-display">📅 <span id="currentYear">1842</span></div>
            <div class="treaty-badge" id="treatyBadge">南京条约</div>
            <div class="btn-group">
                <button class="play-btn" id="playBtn">▶ 播放</button>
                <button id="resetBtn">⟲ 重置</button>
            </div>
        </div>
        <div class="slider-wrapper">
            <span class="year-label">1842</span>
            <input type="range" id="yearSlider" min="1842" max="1895" value="1842" step="1" />
            <span class="year-label">1895</span>
        </div>
        <div class="quick-years" id="quickYears">
            <button class="qy" data-year="1842">1842</button>
            <button class="qy" data-year="1858">1858</button>
            <button class="qy" data-year="1860">1860</button>
            <button class="qy" data-year="1876">1876</button>
            <button class="qy" data-year="1895">1895</button>
        </div>
    </div>

    <script>
        // ---------- 坐标纠偏 (WGS84 → GCJ-02) ----------
        var a = 6378245.0,
            ee = 0.00669342162296594323;

        function transformLat(x, y) {
            var ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * Math.PI) + 20.0 * Math.sin(2.0 * x * Math.PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(y * Math.PI) + 40.0 * Math.sin(y / 3.0 * Math.PI)) * 2.0 / 3.0;
            ret += (160.0 * Math.sin(y / 12.0 * Math.PI) + 320.0 * Math.sin(y * Math.PI / 30.0)) * 2.0 / 3.0;
            return ret;
        }

        function transformLng(x, y) {
            var ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * Math.PI) + 20.0 * Math.sin(2.0 * x * Math.PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(x * Math.PI) + 40.0 * Math.sin(x / 3.0 * Math.PI)) * 2.0 / 3.0;
            ret += (150.0 * Math.sin(x / 12.0 * Math.PI) + 300.0 * Math.sin(x / 30.0 * Math.PI)) * 2.0 / 3.0;
            return ret;
        }

        function wgs84ToGcj02(lng, lat) {
            if (lng < 72.0 || lng > 137.0 || lat < 0.0 || lat > 55.0) return { lng: lng, lat: lat };
            var dLat = transformLat(lng - 105.0, lat - 35.0);
            var dLng = transformLng(lng - 105.0, lat - 35.0);
            var radLat = lat / 180.0 * Math.PI;
            var magic = Math.sin(radLat);
            magic = 1 - ee * magic * magic;
            var sqrtMagic = Math.sqrt(magic);
            dLat = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * Math.PI);
            dLng = (dLng * 180.0) / (a / sqrtMagic * Math.cos(radLat) * Math.PI);
            return { lng: lng + dLng, lat: lat + dLat };
        }

        // ---------- 数据 ----------
        const portsRaw = [
            { city: '广州市', year: 1842, treaty: '南京条约', war: '第一次鸦片战争', country: '英国', lat: 23.1291, lng: 113.2644 },
            { city: '厦门市', year: 1842, treaty: '南京条约', war: '第一次鸦片战争', country: '英国', lat: 24.4798, lng: 118.0894 },
            { city: '福州市', year: 1842, treaty: '南京条约', war: '第一次鸦片战争', country: '英国', lat: 26.0745, lng: 119.2965 },
            { city: '宁波市', year: 1842, treaty: '南京条约', war: '第一次鸦片战争', country: '英国', lat: 29.8683, lng: 121.5440 },
            { city: '上海市', year: 1842, treaty: '南京条约', war: '第一次鸦片战争', country: '英国', lat: 31.2304, lng: 121.4737 },
            { city: '营口市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 40.6668, lng: 122.2352 },
            { city: '烟台市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 37.3999, lng: 121.4474 },
            { city: '汉口市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 30.5979, lng: 114.2645 },
            { city: '九江市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 29.7050, lng: 116.0015 },
            { city: '南京市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 32.0603, lng: 118.7969 },
            { city: '镇江市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 32.2035, lng: 119.4551 },
            { city: '淡水市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 25.1695, lng: 121.4308 },
            { city: '台南市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 22.9997, lng: 120.2270 },
            { city: '汕头市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 23.3710, lng: 116.6822 },
            { city: '琼州市', year: 1858, treaty: '天津条约', war: '第二次鸦片战争', country: '英法', lat: 20.0229, lng: 110.3450 },
            { city: '天津市', year: 1860, treaty: '北京条约', war: '第二次鸦片战争', country: '英法', lat: 39.0842, lng: 117.2009 },
            { city: '大沽市', year: 1860, treaty: '北京条约', war: '第二次鸦片战争', country: '英法', lat: 38.9550, lng: 117.7400 },
            { city: '宜昌市', year: 1876, treaty: '烟台条约', war: '马嘉理事件', country: '英国', lat: 30.6902, lng: 111.2876 },
            { city: '芜湖市', year: 1876, treaty: '烟台条约', war: '马嘉理事件', country: '英国', lat: 31.3521, lng: 118.4063 },
            { city: '温州市', year: 1876, treaty: '烟台条约', war: '马嘉理事件', country: '英国', lat: 27.9945, lng: 120.6994 },
            { city: '北海市', year: 1876, treaty: '烟台条约', war: '马嘉理事件', country: '英国', lat: 21.4730, lng: 109.1204 },
            { city: '重庆市', year: 1890, treaty: '马关条约', war: '甲午战争', country: '日本', lat: 29.5630, lng: 106.5516 },
            { city: '苏州市', year: 1895, treaty: '马关条约', war: '甲午战争', country: '日本', lat: 31.2990, lng: 120.5853 },
            { city: '杭州市', year: 1895, treaty: '马关条约', war: '甲午战争', country: '日本', lat: 30.2741, lng: 120.1551 },
            { city: '荆州市', year: 1895, treaty: '马关条约', war: '甲午战争', country: '日本', lat: 30.3352, lng: 112.2380 }
        ];

        const portsData = portsRaw.map(d => {
            const gcj = wgs84ToGcj02(d.lng, d.lat);
            return { ...d, gcjLng: gcj.lng, gcjLat: gcj.lat };
        });

        const treatyColors = { '南京条约': '#D62728', '天津条约': '#1F77B4', '北京条约': '#2CA02C', '烟台条约': '#FF7F0E',
            '马关条约': '#9467BD' };
        const treatyOrder = ['南京条约', '天津条约', '北京条约', '烟台条约', '马关条约'];

        // ---------- 地图 ----------
        const map = L.map('map', { center: [32.0, 112.0], zoom: 5, zoomControl: true });
        L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            attribution: '&copy; <a href="https://www.amap.com/" target="_blank">高德地图</a>',
            subdomains: ['webrd01', 'webrd02', 'webrd03', 'webrd04'],
            maxZoom: 18
        }).addTo(map);

        // ---------- 标记 ----------
        const markers = [];
        portsData.forEach((d) => {
            const color = treatyColors[d.treaty] || '#888';
            const circle = L.circleMarker([d.gcjLat, d.gcjLng], {
                radius: 9,
                fillColor: color,
                color: '#fff',
                weight: 2,
                fillOpacity: 0.85
            });
            circle._portData = d;
            circle.bindTooltip(d.city, { direction: 'top', offset: [0, -6] });
            circle.bindPopup(`
                <div class="popup-title">${d.city}</div>
                <div class="popup-detail">
                    <span class="label">开放时间</span><span>${d.year} 年</span>
                    <span class="label">相关条约</span><span><strong>${d.treaty}</strong></span>
                    <span class="label">相关战争</span><span>${d.war}</span>
                    <span class="label">相关国家</span><span>${d.country}</span>
                </div>
            `, { maxWidth: 250 });
            markers.push(circle);
            circle.addTo(map);
            circle.setStyle({ opacity: 0, fillOpacity: 0, radius: 0 });
        });

        // ---------- 更新逻辑 ----------
        function getOpenPorts(year) { return portsData.filter(d => d.year <= year); }

        function getNewPorts(year) { return portsData.filter(d => d.year === year); }

        let currentYear = 1842;
        let isPlaying = false,
            playInterval = null;

        function updateMap(year) {
            currentYear = year;
            const openPorts = getOpenPorts(year);
            const newPorts = getNewPorts(year);
            const newSet = new Set(newPorts.map(d => d.city));

            markers.forEach(circle => {
                const d = circle._portData;
                const isOpen = d.year <= year;
                const isNew = newSet.has(d.city);
                if (isOpen) {
                    const color = treatyColors[d.treaty] || '#888';
                    circle.setStyle({
                        radius: isNew ? 12 : 8,
                        fillColor: color,
                        color: isNew ? '#fff' : 'rgba(255,255,255,0.6)',
                        weight: isNew ? 3 : 2,
                        opacity: 1,
                        fillOpacity: isNew ? 1 : 0.7
                    });
                    if (isNew) {
                        circle.getElement()?.classList.add('pulse-marker');
                        setTimeout(() => circle.getElement()?.classList.remove('pulse-marker'), 1200);
                    } else {
                        circle.getElement()?.classList.remove('pulse-marker');
                    }
                    circle.setLatLng([d.gcjLat, d.gcjLng]);
                } else {
                    circle.setStyle({ radius: 0, opacity: 0, fillOpacity: 0 });
                }
            });

            document.getElementById('currentYear').textContent = year;
            document.getElementById('countNum') ? document.getElementById('countNum').textContent = openPorts.length : null;

            const treaties = [...new Set(openPorts.map(d => d.treaty))];
            document.getElementById('treatyBadge').textContent = treaties.length ? treaties.join(' · ') : '—';
            document.querySelectorAll('.qy').forEach(btn => {
                btn.classList.toggle('active-qy', parseInt(btn.dataset.year) === year);
            });
            document.getElementById('yearSlider').value = year;
        }

        // ---------- 控件绑定 ----------
        const slider = document.getElementById('yearSlider');
        slider.addEventListener('input', function() {
            if (isPlaying) stopPlay();
            updateMap(parseInt(this.value));
        });

        document.querySelectorAll('.qy').forEach(btn => {
            btn.addEventListener('click', function() {
                if (isPlaying) stopPlay();
                const year = parseInt(this.dataset.year);
                slider.value = year;
                updateMap(year);
            });
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            if (isPlaying) stopPlay();
            slider.value = 1842;
            updateMap(1842);
        });

        const playBtn = document.getElementById('playBtn');

        function startPlay() {
            if (isPlaying) return;
            isPlaying = true;
            playBtn.textContent = '⏸ 暂停';
            playBtn.classList.add('paused');
            if (currentYear >= 1895) { slider.value = 1842;
                updateMap(1842); }
            playInterval = setInterval(() => {
                let next = currentYear + 1;
                if (next > 1895) { stopPlay(); return; }
                slider.value = next;
                updateMap(next);
            }, 800);
        }

        function stopPlay() {
            isPlaying = false;
            if (playInterval) { clearInterval(playInterval);
                playInterval = null; }
            playBtn.textContent = '▶ 播放';
            playBtn.classList.remove('paused');
        }
        playBtn.addEventListener('click', () => { isPlaying ? stopPlay() : startPlay(); });

        // ---------- 图例 ----------
        let legHtml = `<div class="title">▍ 条约</div>`;
        treatyOrder.forEach(t => {
            const years = portsData.filter(d => d.treaty === t).map(d => d.year);
            const range = years.length ? `${Math.min(...years)}–${Math.max(...years)}` : '';
            legHtml += `
                <div class="legend-item">
                    <span class="dot" style="background:${treatyColors[t]};"></span>
                    <span>${t}</span>
                    <span class="year-range">${range}</span>
                </div>
            `;
        });
        document.getElementById('legend').innerHTML = legHtml;

        // ---------- 启动 ----------
        updateMap(1842);
        map.on('click', () => { if (isPlaying) stopPlay(); });

        // 键盘快捷键支持（便于演示）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                if (isPlaying) stopPlay();
                const val = parseInt(slider.value) + (e.key === 'ArrowRight' ? 1 : -1);
                if (val >= 1842 && val <= 1895) { slider.value = val;
                    updateMap(val); }
                e.preventDefault();
            } else if (e.key === ' ') { e.preventDefault();
                playBtn.click(); }
        });

        console.log('✅ 嵌入版地图加载完成，可通过 iframe 引入。');
    </script>

</body>
</html>
